# TeeUnit Teeworlds Server Configuration
# Deathmatch mode for multi-agent training

# Server identity (not registered publicly)
sv_name "TeeUnit Arena"
sv_register 0
sv_port 8303

# Game settings
sv_gametype dm
sv_map dm1
sv_max_clients 8
sv_player_slots 8
sv_timelimit 0
sv_scorelimit 0
sv_tournament_mode 0

# Gameplay tweaks
sv_warmup 0
sv_countdown 0
sv_spawn_protection 3
sv_respawn_delay 3

# Allow bots/external clients
sv_max_clients_per_ip 8

# RCON for server control
sv_rcon_password "teeunit_rcon"
sv_rcon_max_tries 3
sv_rcon_bantime 0

# Econ (external console) - alternative control method
ec_port 8304
ec_password "teeunit_econ"

# Performance
sv_high_bandwidth 1

# Voting disabled (controlled programmatically)
sv_vote_kick 0
sv_vote_map 0
sv_vote_spectate 0
